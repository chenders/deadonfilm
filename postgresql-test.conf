# =============================================================================
# PostgreSQL 16 Configuration for Test Environment
# Lighter than production — shares server with prod, ~3GB memory budget
# =============================================================================

# -----------------------------------------------------------------------------
# Memory (conservative — production DB also running on same server)
# -----------------------------------------------------------------------------
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 16MB
maintenance_work_mem = 256MB
huge_pages = try

# -----------------------------------------------------------------------------
# Query Planning (SSD optimized)
# -----------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
seq_page_cost = 1.0

# -----------------------------------------------------------------------------
# Parallelism (minimal — leave resources for production)
# -----------------------------------------------------------------------------
max_parallel_workers_per_gather = 1
max_parallel_workers = 2
max_parallel_maintenance_workers = 1

# -----------------------------------------------------------------------------
# WAL / Checkpoints
# -----------------------------------------------------------------------------
wal_buffers = 32MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 256MB

# -----------------------------------------------------------------------------
# Connections
# -----------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 20

# -----------------------------------------------------------------------------
# Logging (minimal — no New Relic integration)
# -----------------------------------------------------------------------------
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'UTC'
log_min_duration_statement = 1000
log_statement = 'ddl'
log_connections = off
log_disconnections = off
log_checkpoints = on
log_lock_waits = on

# -----------------------------------------------------------------------------
# Extensions (pg_stat_statements only — no NR-specific extensions)
# -----------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 5000
pg_stat_statements.track = all
pg_stat_statements.save = on
