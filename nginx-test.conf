pid /tmp/nginx.pid;
worker_processes auto;
# Log errors to stderr for Docker to capture
error_log /dev/stderr warn;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    # Log access to stdout for Docker to capture
    access_log /dev/stdout;
    default_type application/octet-stream;
    # Enable ETags for cache validation (allows 304 responses)
    etag on;
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    server {
        listen 3001 default_server;
        server_name localhost;
        root /app/frontend/dist/client;
        index index.html;

        # API and health endpoints proxy to backend
        location /api/ {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OG image generation endpoint proxy to backend
        location ^~ /og/ {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin API endpoints proxy to backend
        location /admin/api/ {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
        }

        # Bull Board queue monitoring UI
        location /admin/bull-board {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Nginx health check endpoint (doesn't proxy to backend)
        location = /nginx-health {
            default_type text/plain;
            return 200 'OK';
        }

        # Sitemaps - try static files first, fallback to backend
        location ^~ /sitemap {
            root /app/sitemaps;
            try_files $uri @sitemap_backend;
        }

        location @sitemap_backend {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Hashed assets - cache forever (1 year, immutable)
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Fonts - cache for 30 days
        location ^~ /fonts/ {
            add_header Cache-Control "public, max-age=2592000";
            try_files $uri =404;
        }

        # Static images - cache for 30 days
        location ~* \.(svg|png|ico|webp|jpg|jpeg|gif)$ {
            add_header Cache-Control "public, max-age=2592000";
            try_files $uri =404;
        }

        # Serve robots.txt directly from disk
        location = /robots.txt {
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        # SPA fallback — all routes serve index.html (no SSR/prerender in test)
        location / {
            add_header Cache-Control "no-cache";
            try_files $uri $uri/ /index.html;
        }

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    }
}
